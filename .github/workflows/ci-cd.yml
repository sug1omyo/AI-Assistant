name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop, 'feat/**', 'refactor/**' ]
  pull_request:
    branches: [ master, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Python syntax check
      run: |
        python -m compileall -q \
          -x '(^|[\\/])(venv|\.venv|__pycache__|site-packages|ComfyUI|private|node_modules)([\\/]|$)' \
          services app/src

    - name: Run Flake8 (critical errors only)
      run: |
        flake8 services/ app/src/ \
          --count --select=E9,F63,F7 --show-source --statistics \
          --exclude=__pycache__,*.pyc,.git

  test-chatbot:
    name: Test Chatbot Service
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./services/chatbot
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt
        pip install -r requirements.txt

    - name: Run chatbot service tests
      working-directory: ./services/chatbot
      env:
        TESTING: "True"
        MONGODB_ENABLED: "False"
      run: |
        pytest tests/ -v --tb=short --timeout=60

  test-root:
    name: Root Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt
        pip install -r services/chatbot/requirements.txt

    - name: Run root tests (active services only)
      env:
        TESTING: "True"
        MONGODB_ENABLED: "False"
      run: |
        pytest \
          tests/test_chatbot_improvements.py \
          tests/unit/test_chatbot.py \
          tests/unit/test_env_validator.py \
          tests/unit/test_errors.py \
          tests/unit/test_health.py \
          tests/unit/test_security.py \
          tests/unit/test_utils.py \
          tests/integration/test_chatbot_api.py \
          tests/e2e/ \
          -v --tb=short --timeout=120

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'services/'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'HIGH,CRITICAL'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-chatbot, test-root]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    strategy:
      fail-fast: false
      matrix:
        service: [chatbot]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      if: hashFiles(format('services/{0}/Dockerfile', matrix.service)) != ''
      uses: docker/build-push-action@v5
      with:
        context: ./services/${{ matrix.service }}
        file: ./services/${{ matrix.service }}/Dockerfile
        push: false
        tags: |
          ai-assistant-${{ matrix.service }}:${{ github.sha }}
