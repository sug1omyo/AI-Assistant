name: CI/CD Pipeline

on:
  push:
    branches: [ master, Ver_1, develop, 'feat/**' ]
  pull_request:
    branches: [ master, Ver_1, develop ]

jobs:
  # Job 1: Lint and Code Quality
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Run Black (code formatting check)
      run: black --check --exclude '/(\.git|\.venv|venv|ComfyUI|node_modules|__pycache__)/' .
      continue-on-error: true
    
    - name: Run Flake8 (linting)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
          --exclude=.git,__pycache__,venv,.venv,ComfyUI,node_modules,private
      continue-on-error: true
    
    - name: Run isort (import sorting check)
      run: isort --check-only --skip ComfyUI --skip venv --skip .venv --skip node_modules .
      continue-on-error: true

  # Job 2: Test ChatBot Service
  test-chatbot:
    name: Test ChatBot Service
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install test dependencies
      working-directory: ./services/chatbot
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt
        pip install -r requirements.txt || true
    
    - name: Run tests
      working-directory: ./services/chatbot
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term || true
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./services/chatbot/coverage.xml
        flags: chatbot
        name: chatbot-coverage
      continue-on-error: true

  # Job 3: Test Text2SQL Service
  test-text2sql:
    name: Test Text2SQL Service
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install test dependencies
      working-directory: ./services/text2sql
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock
        pip install -r requirements.txt || true
    
    - name: Run tests
      working-directory: ./services/text2sql
      run: |
        pytest tests/ -v --cov=. --cov-report=xml || true
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./services/text2sql/coverage.xml
        flags: text2sql
        name: text2sql-coverage
      continue-on-error: true

  # Job 4: Build Docker Images (master only)
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-chatbot, test-text2sql]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true
    
    - name: Build and push ChatBot image
      uses: docker/build-push-action@v5
      with:
        context: ./services/chatbot
        file: ./services/chatbot/Dockerfile
        push: ${{ secrets.DOCKER_USERNAME != '' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ai-assistant-chatbot:latest
          ${{ secrets.DOCKER_USERNAME }}/ai-assistant-chatbot:${{ github.sha }}
      continue-on-error: true

  # Job 5: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
        # Add your deployment commands here
        # Example: SSH to server and pull latest images
