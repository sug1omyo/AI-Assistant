name: Tests

on:
  push:
    branches: [ master, develop, 'feat/**', 'refactor/**' ]
  pull_request:
    branches: [ master, develop ]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-chatbot:
    name: Service Tests (chatbot)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./services/chatbot
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt
        pip install -r requirements.txt

    - name: Run service tests
      working-directory: ./services/chatbot
      env:
        TESTING: "True"
        MONGODB_ENABLED: "False"
      run: |
        pytest tests/ -v --tb=short --timeout=60

  test-root:
    name: Root Integration Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt
        pip install -r services/chatbot/requirements.txt

    - name: Run root tests (active services only)
      env:
        TESTING: "True"
        MONGODB_ENABLED: "False"
      run: |
        pytest \
          tests/test_chatbot_improvements.py \
          tests/unit/test_chatbot.py \
          tests/unit/test_env_validator.py \
          tests/unit/test_errors.py \
          tests/unit/test_health.py \
          tests/unit/test_security.py \
          tests/unit/test_utils.py \
          tests/integration/test_chatbot_api.py \
          tests/e2e/ \
          -v --tb=short --timeout=120
