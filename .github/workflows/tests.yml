name: Tests

on:
  push:
    branches: [ master, develop, 'feat/**' ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test-chatbot:
    name: ChatBot Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./services/chatbot
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt
        pip install -r requirements.txt || true

    - name: Run ChatBot tests
      working-directory: ./services/chatbot
      run: |
        pytest tests/ -v --tb=short || true

  test-text2sql:
    name: Text2SQL Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./services/text2sql
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock
        pip install -r requirements.txt || true

    - name: Run Text2SQL tests
      working-directory: ./services/text2sql
      run: |
        pytest tests/ -v --tb=short || true

  test-root:
    name: Root Integration Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt || true
        pip install -r requirements.txt || true

    - name: Run root tests
      run: |
        pytest tests/ -v --tb=short || true
