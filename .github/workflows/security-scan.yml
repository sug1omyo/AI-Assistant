name: Security Scanning

on:
  push:
    branches: [ master, develop, 'feat/**', 'refactor/**' ]
  pull_request:
    branches: [ master, develop ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  security-scan:
    name: Run Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install security tools
      run: |
        pip install --upgrade pip
        pip install bandit pip-audit
        
    - name: Run Bandit (Python Security Linter)
      run: |
        bandit -r services/ app/src/ \
          --exclude '**/tests/**,**/__pycache__/**' \
          --severity-level medium \
          --confidence-level medium \
          -f json -o bandit-report.json || true
        bandit -r services/ app/src/ \
          --exclude '**/tests/**,**/__pycache__/**' \
          -f txt || true
      continue-on-error: true
        
    - name: Run pip-audit (active services only)
      run: |
        for req in \
          services/chatbot/requirements.txt \
          services/stable-diffusion/requirements.txt \
          services/edit-image/requirements.txt \
          services/mcp-server/requirements.txt; do
          if [ -f "$req" ]; then
            echo "=== Auditing $req ==="
            pip-audit -r "$req" --desc || true
          fi
        done
      continue-on-error: true
        
    - name: Upload security reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: security-reports-${{ github.sha }}
        path: |
          bandit-report.json
        retention-days: 90

    - name: Comment PR with security summary
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');

          let banditIssues = 0;
          try {
            const bandit = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
            banditIssues = bandit.results.length;
          } catch (e) {
            banditIssues = 'N/A';
          }

          const body = `## Security Scan Results

          **Bandit Issues:** ${banditIssues}

          Download full reports from the Actions artifacts.

          ${banditIssues > 0 ? 'Please review security findings before merging.' : 'No security issues detected.'}`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
        
