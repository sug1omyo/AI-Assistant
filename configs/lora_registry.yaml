# ── LoRA Registry — Complete inventory of all available LoRAs ─────
#
# Categories:
#   quality      — General quality/style enhancement
#   eyes         — Eye detail and effects (including bloodshot, rolling, empty eyes)
#   face         — Face detail and expression effects
#   drunk_sleep  — Drunk and sleep expressions
#   drool        — Drool / saliva effects
#   body         — Body detail and pose effects
#   clothing     — Clothing-related effects
#   nsfw_effect  — NSFW-specific visual effects
#   xray         — X-ray / see-through effects
#   uncensor     — Censorship removal
#   character    — Character-specific LoRAs (Genshin, HSR, Arknights, LoL, etc.)
#
# Locations:
#   comfyui  — ComfyUI/models/loras/
#   lora_dir — LORA/ (root-level, may need copying to ComfyUI)
#
# Each LoRA has recommended strength ranges. Actual strength
# should be adjusted based on context:
#   - Detection inpaint passes: use lower end (0.3-0.5)
#   - Full image generation: use higher end (0.5-0.8)
#   - Stacking multiple LoRAs: reduce each by ~30%

