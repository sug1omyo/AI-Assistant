    # 11. Armpit detection (yolov8 segmentation)
    - region_type: armpit
      model_path: "segm/adetailer2dArmpitYolov8_v10Segmentation.zip"
      confidence_threshold: 0.60
      denoise: 0.28
      padding_ratio: 0.20
      feather_radius: 14
