<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 380px;
            min-height: 480px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
        }
        .header__logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .header__title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }
        .header__status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
        }
        .header__status.online { background: #4ade80; }
        .header__settings-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .header__settings-btn:hover { color: #e0e0e0; }

        .context-bar {
            padding: 8px 14px;
            background: #1e2a4a;
            border-bottom: 1px solid #2a2a4a;
            font-size: 11px;
            color: #8892b0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .context-bar__icon { font-size: 12px; }
        .context-bar__text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .context-bar__btn {
            background: none;
            border: 1px solid #3a3a5a;
            color: #8892b0;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }
        .context-bar__btn:hover {
            background: #2a2a4a;
            color: #e0e0e0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            min-height: 280px;
            max-height: 340px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 90%;
            word-wrap: break-word;
        }
        .msg.user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            background: #2a2a4a;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg.system {
            background: transparent;
            color: #666;
            font-size: 11px;
            text-align: center;
            align-self: center;
            font-style: italic;
        }

        .input-area {
            padding: 10px 12px;
            border-top: 1px solid #2a2a4a;
            background: #16213e;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .input-area__field {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 10px;
            padding: 8px 12px;
            color: white;
            font-size: 13px;
            resize: none;
            max-height: 80px;
            min-height: 36px;
            outline: none;
            font-family: inherit;
        }
        .input-area__field:focus {
            border-color: #667eea;
        }
        .input-area__field::placeholder { color: #555; }
        
        .input-area__send {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .input-area__send:hover { opacity: 0.9; }
        .input-area__send:disabled { opacity: 0.5; cursor: not-allowed; }

        .settings-panel {
            display: none;
            padding: 14px;
            background: #16213e;
            border-top: 1px solid #2a2a4a;
        }
        .settings-panel.show { display: block; }
        .settings-panel label {
            display: block;
            font-size: 11px;
            color: #8892b0;
            margin-bottom: 4px;
            margin-top: 10px;
        }
        .settings-panel label:first-child { margin-top: 0; }
        .settings-panel input, .settings-panel select {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            padding: 6px 10px;
            color: white;
            font-size: 12px;
            outline: none;
        }
        .settings-panel input:focus, .settings-panel select:focus {
            border-color: #667eea;
        }
        .settings-panel__save {
            margin-top: 12px;
            width: 100%;
            background: #667eea;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header__logo">🤖</div>
        <div class="header__title">AI Assistant</div>
        <div class="header__status" id="statusDot"></div>
        <button class="header__settings-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>

    <div class="context-bar" id="contextBar" style="display:none;">
        <span class="context-bar__icon">📄</span>
        <span class="context-bar__text" id="contextText"></span>
        <button class="context-bar__btn" id="capturePageBtn">Capture page</button>
    </div>

    <div class="messages" id="messages">
        <div class="msg system">Ask me anything or capture page context first</div>
    </div>

    <div class="input-area">
        <textarea class="input-area__field" id="messageInput" placeholder="Ask AI..." rows="1"></textarea>
        <button class="input-area__send" id="sendBtn" title="Send">➤</button>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <label>Server URL</label>
        <input type="text" id="serverUrl" placeholder="http://localhost:5000">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="Your API key">
        <label>Model</label>
        <select id="modelSelect">
            <option value="grok">Grok-3</option>
            <option value="gemini">Gemini Flash</option>
            <option value="openai">GPT-4o-mini</option>
            <option value="deepseek">DeepSeek</option>
            <option value="qwen">Qwen Turbo</option>
        </select>
        <button class="settings-panel__save" id="saveSettings">Save Settings</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
