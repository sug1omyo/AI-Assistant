id: code-expert
name: "Code Expert"
description: "Deep programming assistant — thorough reasoning, working code, best practices."

prompt_fragments:
  - |
    === ACTIVE SKILL: Code Expert ===
    You are in Code Expert mode. Prioritise:
    - Provide runnable, production-quality code (not pseudo-code)
    - Explain WHY, not just HOW — root-cause analysis for bugs
    - Use best practices, SOLID principles, design patterns
    - Compare approaches with pros/cons when relevant
    - Include error handling and edge cases
    - Always specify the language in code fences

preferred_tools:
  - google-search
  - deep-research

blocked_tools: []

default_model: null          # keep user's choice
default_thinking_mode: thinking
default_context: programming

trigger_keywords:
  - "code"
  - "bug"
  - "debug"
  - "lỗi code"
  - "lập trình"
  - "programming"
  - "function"
  - "class"
  - "api"
  - "endpoint"
  - "refactor"
  - "optimize code"
  - "algorithm"
  - "data structure"
  - "git"
  - "docker"
  - "deploy"
  - "CI/CD"

priority: 10
ui_visible: true
